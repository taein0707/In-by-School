name: ocl_study
description: "OCL Study — AI 학습 동반자와 함께 성장하는 학습 플랫폼."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # state + routing
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2

  # backend
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  http: ^1.2.2

  # push (server→client via Cloud Functions): 선생님↔학생 알림
  firebase_messaging: ^15.1.3

  # notifications (local/scheduled — no server)
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4
  flutter_timezone: ^3.0.1
  workmanager: ^0.7.0

  # vocab flashcards: on-device OCR + camera/gallery
  google_mlkit_text_recognition: ^0.15.0
  image_picker: ^1.1.2

  # utils + local persistence
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  flutter_webrtc: ^1.5.1

  # bulk student registration: parse uploaded rosters (xlsx)
  excel: ^4.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800