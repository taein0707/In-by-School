- name: Package unsigned .ipa for Sideloadly
  script: |
    set -e

    echo "=== SEARCH Runner.app ==="
    find build -name "Runner.app"

    APP=$(find build -name "Runner.app" | head -n 1)

    if [ -z "$APP" ]; then
      echo "Runner.app not found"
      exit 1
    fi

    echo "FOUND: $APP"

    rm -rf Payload Runner-unsigned.ipa
    mkdir Payload

    cp -R "$APP" Payload/Runner.app

    zip -r Runner-unsigned.ipa Payload

    echo "IPA CREATED"